<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cardápio meu bem i eu</title>

<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'VT323', monospace;
    background:#e9dfc3;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

img { image-rendering: pixelated; }

.container {
    background:#fff6db;
    border:4px solid #3b2f1c;
    box-shadow:
        inset -4px -4px 0 #d8c79a,
        inset 4px 4px 0 #fff8e5,
        0 6px 0 #3b2f1c;
    padding:20px;
    width:720px;
    text-align:center;
    position:relative;
}

/* LOGO */
.logo {
    width:120px;
    margin-bottom:10px;
}

/* CORAÇÃO */
.heart {
    position:absolute;
    left:-40px;
    top:30px;
    width:50px;
}

/* FAVORITOS */
.favs {
    background:#f3e6c4;
    border:2px solid #3b2f1c;
    padding:10px;
    margin-bottom:15px;
    text-align:left;
}

.favs li {
    display:flex;
    justify-content:space-between;
}

.favs button {
    font-size:12px;
}

/* BOTÕES */
.botoes {
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:10px;
}

button {
    font-family:inherit;
    font-size:20px;
    border:3px solid #3b2f1c;
    background:#c8a46b;
    box-shadow:
        inset -3px -3px 0 #8c6f3f,
        inset 3px 3px 0 #f2d29b,
        0 4px 0 #3b2f1c;
    cursor:pointer;
    padding:10px;
}

button:active {
    transform:translateY(4px);
}

/* SLOT */
.slot-window {
    width:300px;
    height:80px;
    overflow:hidden;
    border:4px solid #3b2f1c;
    background:#fff8dc;
    margin:20px auto;
    position:relative;
}

.slot-track {
    position:absolute;
    width:100%;
}

.slot-item {
    height:80px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
}

/* RESULTADO */
.resultado {
    margin-top:15px;
}
</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">
<img src="coracao.png" class="heart">

<h1>Cardápio meu bem i eu</h1>

<div class="favs">
<b>❤️ Favoritos</b>
<ul id="listaFav"></ul>
</div>

<div class="botoes">
<button onclick="sortear('rapidas')">🍳 rápido</button>
<button onclick="sortear('banquete')">🍖 banquete</button>
<button onclick="sortear('sobremesa')">🍰 doce</button>
</div>

<div class="slot-window">
    <div class="slot-track" id="track"></div>
</div>

<div id="resultado" class="resultado"></div>

<audio id="click" src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b2b06.mp3"></audio>
<audio id="win" src="https://cdn.pixabay.com/audio/2022/03/15/audio_3c1f9a3b1b.mp3"></audio>

</div>

<script>

// RECEITAS
const receitas = [
{nome:"Shakshuka",cat:"rapidas",url:"https://www.lecreuset.com.br/shakshuka/SKI_084.html"},
{nome:"Camembert Folhado",cat:"rapidas",url:"https://www.lecreuset.com.br/entradas-e-acompanhamentos/queijo-camembert-folhado-com-mel-e-nozes/LCO-21045.html"},
{nome:"Creme de Abóbora",cat:"rapidas",url:"https://www.lecreuset.com.br/entradas-e-acompanhamentos/creme-de-abobora-com-gengibre/LCO-21016.html"},

{nome:"Boeuf Bourguignon",cat:"banquete",url:"https://www.lecreuset.com.br/refeicoes-principais/boeuf-bourguignon/LCO-21114.html"},
{nome:"Risoto",cat:"banquete",url:"https://www.lecreuset.com.br/refeicoes-principais/risoto-de-alho-poro-e-parmesao/LCO-21043.html"},
{nome:"Ragu de Costela",cat:"banquete",url:"https://www.lecreuset.com.br/refeicoes-principais/ragu-de-costela-com-polenta-cremosa/LCO-21043.html"},

{nome:"Bolo de Cenoura",cat:"sobremesa",url:"https://www.lecreuset.com.br/sobremesas/bolo-de-cenoura-com-brigadeiro/LCO-21044.html"},
{nome:"Tarte Tatin",cat:"sobremesa",url:"https://www.lecreuset.com.br/sobremesas/tarte-tatin-de-maca/LCO-21051.html"},
{nome:"Grand Gateau",cat:"sobremesa",url:"https://www.lecreuset.com.br/sobremesas/grand-gateau-de-chocolate/LCO-21011.html"}
];

// FAVORITOS
let favoritos = JSON.parse(localStorage.getItem("fav")) || [];

function salvar(nome,url){
    if(!favoritos.some(f=>f.nome===nome)){
        favoritos.push({nome,url});
        localStorage.setItem("fav", JSON.stringify(favoritos));
        renderFav();
    }
}

function remover(nome){
    favoritos = favoritos.filter(f=>f.nome!==nome);
    localStorage.setItem("fav", JSON.stringify(favoritos));
    renderFav();
}

function renderFav(){
    const ul = document.getElementById("listaFav");
    ul.innerHTML="";
    favoritos.forEach(f=>{
        const li=document.createElement("li");
        li.innerHTML=`<a href="${f.url}" target="_blank">${f.nome}</a>
        <button onclick="remover('${f.nome}')">x</button>`;
        ul.appendChild(li);
    });
}

renderFav();

// SLOT MACHINE
function sortear(cat){

    document.getElementById("click").play();

    const lista = receitas.filter(r=>r.cat===cat);
    const track = document.getElementById("track");
    const resultado = document.getElementById("resultado");

    let items=[];
    for(let i=0;i<25;i++){
        items.push(lista[Math.floor(Math.random()*lista.length)]);
    }

    track.innerHTML = items.map(r=>`<div class="slot-item">${r.nome}</div>`).join("");

    let pos=0;
    let speed=30;

    const anim=setInterval(()=>{
        pos+=speed;
        track.style.transform=`translateY(-${pos}px)`;
        speed*=0.97;

        if(speed<1){
            clearInterval(anim);

            const final=lista[Math.floor(Math.random()*lista.length)];
            const index=items.findIndex(i=>i.nome===final.nome);

            track.style.transition="transform 0.5s ease-out";
            track.style.transform=`translateY(-${index*80}px)`;

            document.getElementById("win").play();

            setTimeout(()=>{
                resultado.innerHTML=`
                ⭐ ${final.nome}<br><br>
                <a href="${final.url}" target="_blank">ver receita</a><br><br>
                <button onclick="salvar('${final.nome}','${final.url}')">❤️ salvar</button>
                `;
            },500);
        }

    },16);
}

</script>

</body>
</html>
