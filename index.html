<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Impede que o celular inverta as cores e estrague o visual retrô -->
    <meta name="color-scheme" content="light only">
    
    <!-- Conecta as configurações do seu aplicativo -->
    <link rel="manifest" href="manifest.json">

    <title>Cardápio meu bem i eu</title>

    <!-- Fontes Retro complementares -->
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&family=Plus+Jakarta+Sans:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            color-scheme: light;
            --cor-fundo: #fff6db;
            --cor-borda: #3b2f1c;
            --cor-botao: #c8a46b;
            --cor-botao-hover: #dfba82;
            --cor-sombra-botao: #8c6f3f;
            --cor-texto: #2c2013;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--cor-fundo);
            color: var(--cor-texto);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--cor-fundo);
            border: 4px solid var(--cor-borda);
            padding: 30px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-shadow: 8px 8px 0px var(--cor-borda);
            image-rendering: pixelated;
        }

        .pixel-art {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            display: block;
        }

        h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .subtitle {
            font-family: 'VT323', monospace;
            font-size: 24px;
            margin-bottom: 30px;
            color: #6d5634;
        }

        .display-container {
            border: 4px solid var(--cor-borda);
            background-color: #fff;
            padding: 20px;
            margin-bottom: 30px;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: inset 4px 4px 0px rgba(0,0,0,0.1);
        }

        .tipo-refeicao {
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            color: #a08050;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .prato-sorteado {
            font-family: 'Press Start 2P', cursive;
            font-size: 14px;
            line-height: 1.4;
            color: var(--cor-texto);
            word-break: break-word;
        }

        .btn-sortear {
            font-family: 'Press Start 2P', cursive;
            font-size: 12px;
            background-color: var(--cor-botao);
            color: var(--cor-borda);
            border: 4px solid var(--cor-borda);
            padding: 15px 25px;
            width: 100%;
            cursor: pointer;
            box-shadow: 0px 6px 0px var(--cor-sombra-botao);
            position: relative;
            transition: all 0.1s ease;
            text-transform: uppercase;
        }

        .btn-sortear:hover {
            background-color: var(--cor-botao-hover);
        }

        .btn-sortear:active {
            box-shadow: 0px 2px 0px var(--cor-sombra-botao);
            top: 4px;
        }

        /* Ajuste responsivo extra para telas bem pequenas */
        @media (max-width: 360px) {
            h1 { font-size: 14px; }
            .prato-sorteado { font-size: 12px; }
            .btn-sortear { font-size: 10px; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Imagem da logo/coração -->
    <img src="logo.png" alt="Coração Retrô" class="pixel-art" id="logo-img">
    
    <h1>Cardápio<br>Meu Bem i Eu</h1>
    <p class="subtitle">O que vamos cozinhar hoje?</p>

    <div class="display-container">
        <div class="tipo-refeicao" id="refeicao-tipo">Clique abaixo</div>
        <div class="prato-sorteado" id="refeicao-nome">🤔 O que será?</div>
    </div>

    <button class="btn-sortear" id="btn-sortear">Sorteando...</button>
</div>

<!-- Elementos de áudio para os efeitos sonoros -->
<audio id="som-click" src="click.mp3" preload="auto"></audio>
<audio id="som-sucesso" src="success.mp3" preload="auto"></preload></audio>

<script>
    // Banco de dados de refeições do casal
    const cardapio = {
        "Almoço / Jantar": [
            "Strogonoff de Frango",
            "Macarrão Carbonara",
            "Hambúrguer Caseiro",
            "Escondidinho de Carne Seca",
            "Fricassê de Frango",
            "Pizza Caseira",
            "Arroz de Forno Cremoso",
            "Panqueca de Carne Moída",
            "Lasanha à Bolonhesa",
            "Risoto de Alho Poró"
        ],
        "Café / Lanche": [
            "Pão de Queijo de Frigideira",
            "Bolo de Cenoura com Chocolate",
            "Panqueca Americana com Mel",
            "Misto Quente Especial",
            "Waffle com Morango",
            "Tapioca Recheada",
            "Crepioca de Queijo"
        ]
    };

    // Elementos da página
    const btnSortear = document.getElementById('btn-sortear');
    const txtTipo = document.getElementById('refeicao-tipo');
    const txtNome = document.getElementById('refeicao-nome');
    const somClick = document.getElementById('som-click');
    const somSucesso = document.getElementById('som-sucesso');
    const logoImg = document.getElementById('logo-img');

    let rolando = false;

    // Garante que o texto do botão inicialize correto
    btnSortear.textContent = "Sortear Prato";

    function sortear() {
        if (rolando) return;
        rolando = true;
        btnSortear.textContent = "Escolhendo...";

        // Seleciona uma categoria aleatória
        const categorias = Object.keys(cardapio);
        const categoriaSorteada = categorias[Math.floor(Math.random() * categorias.length)];
        const pratos da Categoria = cardapio[categoriaSorteada];

        let giros = 0;
        const maxGiros = 12;

        // Efeito de "roleta" embaralhando os pratos na tela
        const intervalo = setInterval(() => {
            const catAleatoria = categorias[Math.floor(Math.random() * categorias.length)];
            const pratosAleatorios = cardapio[catAleatoria];
            const pratoAleatorio = pratosAleatorios[Math.floor(Math.random() * pratosAleatorios.length)];
            
            txtTipo.textContent = catAleatoria;
            txtNome.textContent = pratoAleatorio;
            
            // Toca o som de clique a cada troca rápida de prato
            if(somClick) {
                somClick.currentTime = 0;
                somClick.play().catch(() => {});
            }
            
            // Pequeno efeito visual de pulo no coração durante o giro
            logoImg.style.transform = giros % 2 === 0 ? 'scale(1.1)' : 'scale(1)';

            giros++;

            if (giros >= maxGiros) {
                clearInterval(intervalo);
                
                // Escolha definitiva do prato sorteado
                const pratoFinal = pratos da Categoria[Math.floor(Math.random() * pratos da Categoria.length)];
                
                txtTipo.textContent = categoriaSorteada;
                txtNome.textContent = pratoFinal;
                btnSortear.textContent = "Sortear de Novo";
                logoImg.style.transform = 'scale(1)';
                
                // Toca o som de sucesso quando para no prato final
                if(somSucesso) {
                    somSucesso.currentTime = 0;
                    somSucesso.play().catch(() => {});
                }

                rolando = false;
            }
        }, 120);
    }

    btnSortear.addEventListener('click', sortear);

    // 🌟 ATIVAÇÃO DO APLICATIVO (SERVICE WORKER)
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('Aplicativo instalado com sucesso!', reg))
                .catch(err => console.log('Erro ao configurar o aplicativo', err));
        });
    }
</script>

</body>
</html>
