<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cardápio meu bem i eu</title>

<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@500;700&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Comfortaa',sans-serif;
    background:#f4ebd0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

/* CONTAINER */
.container{
    background:#fff6db;
    border:4px solid #6f7f3b;
    outline:4px solid #2c2013;
    padding:25px;
    width:700px;
    text-align:center;
    box-shadow:0 15px 0 #2c2013;
    animation:fade 0.8s;
}

/* LOGO */
.logo img{ width:130px; }

/* CORAÇÃO */
.coracao{
    position:absolute;
    left:-30px;
    top:10px;
    width:60px;
    animation:pulse 1.2s infinite;
}

@keyframes pulse{
    0%{transform:scale(1)}
    50%{transform:scale(1.2)}
    100%{transform:scale(1)}
}

/* BOTÕES */
.botoes{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:12px;
    margin-top:20px;
}

button{
    border:3px solid #2c2013;
    padding:12px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    font-weight:bold;
    box-shadow:0 5px 0 #2c2013;
    transition:0.1s;
}

button img{ width:30px; }

button:hover{
    transform:scale(1.05);
    filter:brightness(1.1);
}

button:active{
    transform:translateY(5px);
}

.btn1{ background:#9cb46e; }
.btn2{ background:#ddaa67; }
.btn3{ background:#e2a39f; }

/* ROLETA */
.roleta{
    margin-top:20px;
    padding:25px;
    border:3px dashed #444;
    font-size:20px;
    background:#fff9e6;
}

/* RESULTADO */
.resultado{
    display:none;
    margin-top:20px;
}

.tag{
    background:#e1d3b0;
    border:2px solid #2c2013;
    padding:5px 10px;
}

/* PARTÍCULAS */
.spark{
    position:fixed;
    width:6px;
    height:6px;
    background:gold;
    border-radius:50%;
    animation:explode 0.8s forwards;
}

@keyframes explode{
    to{
        transform:translate(var(--x),var(--y));
        opacity:0;
    }
}

@keyframes fade{
    from{opacity:0; transform:translateY(10px)}
    to{opacity:1;}
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
<img src="logo.png">
</div>

<h2>Cardápio meu bem i eu</h2>
<p>o que vamos cozinhar hoje?</p>

<div class="botoes">
<button class="btn1" onclick="sortear('rapidas')">
<img src="frigideira.png"> rápido
</button>

<button class="btn2" onclick="sortear('banquetes')">
<img src="faca.png"> banquete
</button>

<button class="btn3" onclick="sortear('sobremesas')">
<img src="fouet.png"> doce
</button>
</div>

<div id="roleta" class="roleta">clique em uma categoria ❤️</div>

<div id="resultado" class="resultado">
<span id="tag" class="tag"></span>
<h2><a id="link" target="_blank"></a></h2>
<button onclick="favoritar()">⭐ salvar</button>
</div>

</div>

<!-- ÁUDIO -->
<audio id="click" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b1a76.mp3"></audio>

<audio id="win" src="https://cdn.pixabay.com/download/audio/2022/03/10/audio_c8c8a73467.mp3"></audio>
    
<script>
const receitas=[
{nome:"Risoto",cat:"banquetes",tag:"chique",url:"#"},
{nome:"Bolo",cat:"sobremesas",tag:"doce",url:"#"},
{nome:"Omelete",cat:"rapidas",tag:"rápido",url:"#"}
];

let atual=null;

function play(id){
document.getElementById(id).currentTime=0;
document.getElementById(id).play();
}

function sortear(cat){
play("click");

let lista=receitas.filter(r=>r.cat==cat);
let i=0;

let anim=setInterval(()=>{
document.getElementById("roleta").innerText=
lista[Math.floor(Math.random()*lista.length)].nome;
i++;

if(i>15){
clearInterval(anim);

atual=lista[Math.floor(Math.random()*lista.length)];

document.getElementById("roleta").innerText="✨ escolhido!";
document.getElementById("resultado").style.display="block";

document.getElementById("link").innerText=atual.nome;
document.getElementById("tag").innerText=atual.tag;

play("win");
explodir();
}

},80);
}

function favoritar(){
alert("salvo ❤️");
}

function explodir(){
for(let i=0;i<30;i++){
let s=document.createElement("div");
s.className="spark";
s.style.left=window.innerWidth/2+"px";
s.style.top=window.innerHeight/2+"px";
s.style.setProperty("--x",(Math.random()*300-150)+"px");
s.style.setProperty("--y",(Math.random()*300-150)+"px");
document.body.appendChild(s);

setTimeout(()=>s.remove(),800);
}
}
</script>

</body>
</html>
