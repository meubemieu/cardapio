<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cardápio meu bem i eu</title>

<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@500;700&display=swap" rel="stylesheet">

<style>
body {
    background-color: #f4ebd0;
    background-image: url("https://raw.githubusercontent.com/meubemieu/cardapio/refs/heads/main/FRENTE.jpg.png");
}

/* 👩‍🍳 PERSONAGENS LATERAIS */
.personagem {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    height: 80vh;
    opacity: 0.25;
    z-index: 1;
    pointer-events: none;
}

.esquerda { left: 0; }
.direita { right: 0; }

/* 📦 CONTAINER ESTILO JOGO */
.container {
    border-radius: 0;
    outline: 4px solid #2c2013;
}

/* TOPO */
.logo img {
    width: 140px;
}

/* TEXTOS */
h1 { margin: 10px 0 5px; }
.subtitulo { font-size: 14px; color: #444; }

/* FAVORITOS */
.secao-favoritos {
    background: #f3e6c4;
    border: 2px solid #c9b996;
    padding: 15px;
    margin: 20px 0;
    position: relative;
}

.coracao-decorativo {
    position: absolute;
    left: -35px;
    top: 10px;
    width: 50px;
}

.lista-favoritos {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    list-style: none;
    padding: 0;
}

/* BOTÕES */
.botoes-grupo {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
}

button {
    border: 3px solid #2c2013;
    background: #9cb46e;
    box-shadow:
        inset -3px -4px 0 rgba(0,0,0,0.25),
        0 4px 0 #2c2013;
    font-weight: bold;
    cursor: pointer;
}

button:active {
    transform: translateY(4px);
    box-shadow: inset -1px -1px 0 rgba(0,0,0,0.2);
}

button:active {
    transform: translateY(3px);
}

/* CORES */
.btn-rapidas { background: #9cb46e; }
.btn-banquetes { background: #ddaa67; }
.btn-sobremesas { background: #e2a39f; }

/* CAIXA */
.roleta-box {
    border: 3px dashed #5a5a5a;
    background: #fff9e6;
    padding: 20px;
    margin-top: 20px;
}

/* RESULTADO */
.tag-categoria {
    background: #e8d8b5;
    border: 2px solid #2c2013;
    padding: 5px 10px;
    display: inline-block;
    margin-top: 10px;
}

/* SPOTIFY */
.spotify {
    position: absolute;
    bottom: 10px;
    right: 10px;
}
</style>
</head>

<body>

<!-- 👩‍🍳 PERSONAGENS -->

<div class="container">

<div class="logo">
<img src="https://raw.githubusercontent.com/meubemieu/cardapio/refs/heads/main/FRENTE.jpg.png">
</div>

<h1>Cardápio meu bem i eu</h1>
<p class="subtitulo">o que vamos cozinhar esse mês?</p>

<div class="secao-favoritos">
<img src="https://raw.githubusercontent.com/meubemieu/cardapio/refs/heads/main/5.png.png">
<h3>❤️ Nossas Receitas Favoritas:</h3>
<ul id="lista-favoritos"></ul>
</div>

<div class="botoes-grupo">
<button class="btn-rapidas" onclick="sortear('rapidas')">jantar vapt-vupt</button>
<button class="btn-banquetes" onclick="sortear('banquetes')">banquete</button>
<button class="btn-sobremesas" onclick="sortear('sobremesas')">sobremesas</button>
</div>

<div id="roleta" class="roleta-box">escolha uma categoria ❤️</div>

<div id="resultado" style="display:none;">
<span id="tag" class="tag-categoria"></span>
<h2><a id="link" target="_blank"></a></h2>
<button onclick="favoritar()">⭐ salvar</button>
</div>

<div class="spotify">
<iframe style="border-radius:12px"
src="https://open.spotify.com/playlist/2ZZYiGV26U0l4LaNny6LTr?si=rBsAPO0qTJWGGKdV1oLyMA&pi=wzPalu3JT7Oq5"
width="220" height="80"></iframe>
</div>

</div>

<script>
const receitas = [
{nome:"Shakshuka",cat:"rapidas",tag:"rápido",url:"#"},
{nome:"Risoto",cat:"banquetes",tag:"chique",url:"#"},
{nome:"Bolo",cat:"sobremesas",tag:"doce",url:"#"}
];

function sortear(cat){
let lista = receitas.filter(r=>r.cat==cat);
let r = lista[Math.floor(Math.random()*lista.length)];

document.getElementById("roleta").innerText = "✨ escolhido!";
document.getElementById("resultado").style.display="block";
document.getElementById("link").innerText = r.nome;
document.getElementById("link").href = r.url;
document.getElementById("tag").innerText = r.tag;
}

function favoritar(){
alert("salvo 💖");
}
</script>

</body>
</html>
