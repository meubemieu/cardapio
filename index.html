<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#c8a46b">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="color-scheme" content="light only">

    <title>Cardápio meu bem i eu</title>

    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&family=Plus+Jakarta+Sans:wght@500;700&display=swap" rel="stylesheet">

    <style>
    :root {
        color-scheme: light;
        --cor-fundo: #fff6db;
        --cor-borda: #3b2f1c;
        --cor-botao: #c8a46b;
        --cor-botao-hover: #dfba82;
        --cor-sombra-botao: #8c6f3f;
        --cor-texto: #2c2013;
    }

    * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    body {
        margin: 0;
        font-family: 'VT323', monospace;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 15px;
        background-color: #1a120b;
    }

    /* FUNDO BORRADO */
    body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
            linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.75)),
            url("logo.png") center/cover no-repeat;
        filter: blur(8px);
        transform: scale(1.05);
        z-index: -1;
    }

    /* CONTAINER PRINCIPAL */
    .container {
        background: var(--cor-fundo);
        border: 4px solid var(--cor-borda);
        border-radius: 12px;
        box-shadow:
            inset -4px -4px 0 #d8c79a,
            inset 4px 4px 0 #fff8e5,
            0 12px 0 rgba(0,0,0,0.4),
            0 20px 25px rgba(0,0,0,0.3);
        padding: 25px 20px;
        width: 100%;
        max-width: 480px;
        text-align: center;
        position: relative;
    }

    /* LOGO */
    .logo {
        width: 140px; /* Reduzido levemente para equilibrar o topo */
        height: auto;
        filter: drop-shadow(0 4px 0 var(--cor-borda));
        margin-bottom: 10px;
    }

    /* ÁREA DO TÍTULO + CORAÇÃO ALINHADOS */
    .titulo-wrapper {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin: 0 auto 5px auto;
        position: relative;
        max-width: 100%;
    }

    h1 {
        font-size: 28px; /* Diminuído para caber melhor na linha sem quebras bruscas */
        color: var(--cor-texto);
        margin: 0;
        text-shadow: 1px 1px 0 #fff;
        letter-spacing: 0.5px;
        line-height: 1.1;
    }

    /* SUBTÍTULO ADDED */
    .subtitulo {
        font-size: 20px; /* Reduzido de 24px */
        color: #5c4a33;
        margin: 0 0 20px 0;
        letter-spacing: 0.5px;
    }

    /* 💖 CORAÇÃO ANCORADO JUNTO AO TEXTO */
    .heart {
        width: 32px; /* Reduzido de 45px para acompanhar o novo tamanho do texto */
        height: auto;
        animation: pulse 1.2s infinite ease-in-out;
        filter: drop-shadow(0 2px 0 var(--cor-borda));
        flex-shrink: 0;
    }

    @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.15) rotate(5deg); }
        100% { transform: scale(1); }
    }

    /* LAYOUT DOS BOTÕES */
    .botoes {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 8px;
        margin-bottom: 20px;
    }

    button {
        font-family: 'VT323', monospace;
        font-size: 19px; /* Reduzido de 22px para evitar quebras nos emojis */
        color: var(--cor-texto);
        border: 3px solid var(--cor-borda);
        background: var(--cor-botao);
        border-radius: 8px;
        box-shadow:
            inset -3px -3px 0 var(--cor-sombra-botao),
            inset 3px 3px 0 #f2d29b,
            0 4px 0 var(--cor-borda);
        cursor: pointer;
        padding: 6px 2px;
        position: relative;
        transition: background 0.1s, transform 0.1s, box-shadow 0.1s;
    }

    button:hover {
        background: var(--cor-botao-hover);
    }

    button:active {
        transform: translateY(4px);
        box-shadow:
            inset -3px -3px 0 var(--cor-sombra-botao),
            inset 3px 3px 0 #f2d29b,
            0 0px 0 var(--cor-borda);
    }

    /* JANELA DO SLOT MACHINE */
    .slot-window {
        width: 100%;
        max-width: 360px;
        height: 75px; /* Reduzido de 90px */
        overflow: hidden;
        border: 4px solid var(--cor-borda);
        border-radius: 8px;
        background: #fffbe9;
        margin: 0 auto 20px auto;
        position: relative;
        box-shadow:
            inset 0 4px 8px rgba(0,0,0,0.15),
            inset 0 -4px 8px rgba(0,0,0,0.15);
    }

    .slot-window::before {
        content: "";
        position: absolute;
        left: 0; right: 0; top: 50%;
        height: 2px;
        background: rgba(59, 47, 27, 0.08);
        pointer-events: none;
        z-index: 2;
    }

    .slot-track {
        position: absolute;
        width: 100%;
        top: 0;
    }

    .slot-item {
        height: 67px; /* Ajustado proporcionalmente à nova altura da janela */
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px; /* Reduzido de 26px */
        color: #8c7a65;
        opacity: 0.4;
        padding: 0 10px;
        transition: opacity 0.2s, transform 0.2s;
    }

    .slot-item.active {
        transform: scale(1.1);
        opacity: 1;
        color: var(--cor-texto);
        font-weight: bold;
    }

    /* ÁREA DE RESULTADO */
    .resultado {
        min-height: 100px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }

    .resultado-card {
        animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        background: #fdf1cb;
        border: 3px dashed var(--cor-borda);
        padding: 12px;
        border-radius: 8px;
        width: 100%;
    }

    @keyframes pop {
        0% { transform: scale(0.8); opacity: 0; }
        100% { transform: scale(1); opacity: 1; }
    }

    .resultado-titulo {
        font-family: 'Press Start 2P', monospace;
        font-size: 10px;
        color: #bd1c1c;
        margin-bottom: 6px;
        display: block;
    }

    .resultado-name {
        font-size: 26px; /* Reduzido de 32px para não estourar a caixa em nomes grandes */
        color: var(--cor-texto);
        margin: 5px 0 12px 0;
        line-height: 1.2;
    }

    /* BOTÃO DE LINK ESTILIZADO */
    .btn-receita {
        display: inline-block;
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-weight: 700;
        font-size: 13px;
        text-decoration: none;
        color: #fff;
        background: #4a7c59;
        border: 2px solid var(--cor-borda);
        padding: 6px 16px;
        border-radius: 6px;
        box-shadow: 0 3px 0 var(--cor-borda);
        transition: 0.1s;
    }

    .btn-receita:hover {
        background: #568f67;
    }

    .btn-receita:active {
        transform: translateY(2px);
        box-shadow: 0 1px 0 var(--cor-borda);
    }

    /* Ajustes finos para telas muito pequenas */
    @media (max-width: 380px) {
        h1 { font-size: 24px; }
        .subtitulo { font-size: 18px; }
        .heart { width: 26px; }
        button { font-size: 16px; }
        .slot-item { font-size: 19px; }
        .resultado-name { font-size: 22px; }
    }
    </style>
</head>

<body>

<div class="container">

    <img src="logo.png" class="logo" alt="Logo">

    <div class="titulo-wrapper">
        <h1>Cardápio meu bem i eu</h1>
        <img src="coracao.png" class="heart" alt="Coração">
    </div>
    
    <div class="subtitulo">O que vamos cozinhar esse mês?</div>

    <div class="botoes">
        <button onclick="sortear('rapidas')">🍳 rápido</button>
        <button onclick="sortear('banquete')">🍖 banquete</button>
        <button onclick="sortear('sobremesa')">🍰 doce</button>
    </div>

    <div class="slot-window">
        <div class="slot-track" id="track"></div>
    </div>

    <div id="resultado" class="resultado"></div>
</div>

<script>
const receitas = [
    {nome:"Shakshuka",cat:"rapidas",url:"https://www.lecreuset.com.br/shakshuka/SKI_084.html"},
    {nome:"Camembert Folhado",cat:"rapidas",url:"https://www.lecreuset.com.br/entradas-e-acompanhamentos/queijo-camembert-folhado-com-mel-e-nozes/LCO-21045.html"},
    {nome:"Creme de Abóbora",cat:"rapidas",url:"https://www.lecreuset.com.br/entradas-e-acompanhamentos/creme-de-abobora-com-gengibre/LCO-21016.html"},
    {nome:"Boeuf Bourguignon",cat:"banquete",url:"https://www.lecreuset.com.br/refeicoes-principais/boeuf-bourguignon/LCO-21114.html"},
    {nome:"Ragu de Costela",cat:"banquete",url:"https://www.lecreuset.com.br/refeicoes-principais/ragu-de-costela-com-polenta-cremosa/LCO-21043.html"},
    {nome:"Risoto de Alho-Poró",cat:"banquete",url:"https://www.lecreuset.com.br/refeicoes-principais/risoto-de-alho-poro-e-parmesao/LCO-21043.html"},
    {nome:"Bolo de Cenoura",cat:"sobremesa",url:"https://www.lecreuset.com.br/sobremesas/bolo-de-cenoura-com-brigadeiro/LCO-21044.html"},
    {nome:"Tarte Tatin",cat:"sobremesa",url:"https://www.lecreuset.com.br/sobremesas/tarte-tatin-de-maca/LCO-21051.html"},
    {nome:"Grand Gateau",cat:"sobremesa",url:"https://www.lecreuset.com.br/sobremesas/grand-gateau-de-chocolate/LCO-21011.html"}
];

let emAnimacao = false;
let audioCtx = null;

document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("track").innerHTML = '<div class="slot-item active">???</div>';
});

function iniciarAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
}

function tocarSomClique() {
    iniciarAudio();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    
    osc.type = 'sine';
    osc.frequency.setValueAtTime(400, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.1);
    
    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
    
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.1);
}

function tocarSomItem() {
    iniciarAudio();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(300, audioCtx.currentTime);
    
    gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.04);
    
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.04);
}

function tocarSomVitoria() {
    iniciarAudio();
    const agora = audioCtx.currentTime;
    
    const notas = [523.25, 659.25, 783.99, 1046.50];
    const tempos = [0, 0.08, 0.16, 0.24];
    
    notas.forEach((nota, idx) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.type = 'square';
        osc.frequency.setValueAtTime(nota, agora + tempos[idx]);
        
        gain.gain.setValueAtTime(0.08, agora + tempos[idx]);
        gain.gain.linearRampToValueAtTime(0, agora + tempos[idx] + 0.2);
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(agora + tempos[idx]);
        osc.stop(agora + tempos[idx] + 0.2);
    });
}

function sortear(cat){
    if (emAnimacao) return;
    emAnimacao = true;
    
    tocarSomClique();

    const lista = receitas.filter(r=>r.cat===cat);
    const track = document.getElementById("track");
    const resultado = document.getElementById("resultado");

    resultado.innerHTML = "";

    let items = [];
    for(let i=0; i<30; i++){
        items.push(lista[Math.floor(Math.random()*lista.length)]);
    }
    
    const vencedor = lista[Math.floor(Math.random()*lista.length)];
    const posicaoVencedor = 26;
    items[posicaoVencedor] = vencedor;

    track.innerHTML = items.map(r=>`<div class="slot-item">${r.nome}</div>`).join("");
    
    track.style.transition = "none";
    track.style.transform = "translateY(0px)";
    
    track.offsetHeight;

    const itemHeight = 67; // Atualizado para bater com a nova altura css
    const deslocamentoFinal = posicaoVencedor * itemHeight;
    
    track.style.transition = "transform 3.5s cubic-bezier(0.1, 0.8, 0.1, 1)";
    track.style.transform = `translateY(-${deslocamentoFinal}px)`;

    let somIntervalo = 60; 
    let tempoAcumulado = 0;
    
    function agendarProximoSom() {
        if (tempoAcumulado > 3000) return;
        
        setTimeout(() => {
            tocarSomItem();
            somIntervalo *= 1.14;
            tempoAcumulado += somIntervalo;
            agendarProximoSom();
        }, somIntervalo);
    }
    agendarProximoSom();

    setTimeout(() => {
        if(track.children[posicaoVencedor]) {
            track.children[posicaoVencedor].classList.add("active");
        }
        
        tocarSomVitoria();

        resultado.innerHTML = `
            <div class="resultado-card">
                <span class="resultado-titulo">⭐ SORTEADO! ⭐</span>
                <div class="resultado-nome">${vencedor.nome}</div>
                <a href="${vencedor.url}" target="_blank" class="btn-receita" onclick="tocarSomClique()">Ver Receita</a>
            </div>
        `;
        emAnimacao = false;
    }, 3500);
}

if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
            .then(reg => {
                console.log('Aplicativo pronto!', reg);
                reg.update();
            })
            .catch(err => console.log('Erro no app', err));
    });
}
</script>

</body>
</html>
