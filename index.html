<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio meu bem i eu</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@500;700&display=swap" rel="stylesheet">
    <style>
        /* 🎨 Fundo Estilo Stardew Valley */
        body {
            font-family: 'Comfortaa', 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            background-color: #f4ebd0;
            position: relative;
            overflow-x: hidden;
        }

        /* Camada de Fundo */
        .fundo-fallback {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background-color: #f4ebd0;
        }
        .fundo-fallback img {
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0.35; /* Ajustado para dar destaque ao painel, igual à imagem */
        }

        /* 📦 O Painel Central (Estilo Diário/Menu do Jogo) */
        .container {
            background-color: #fffae8;
            border: 4px solid #788a42; /* Borda verde musgo clássica */
            outline: 2px solid #2c2013; /* Linha fina externa */
            border-radius: 4px; /* Menos arredondado para parecer pixel art */
            box-shadow: 0 12px 35px rgba(0,0,0,0.25);
            max-width: 680px;
            width: 100%;
            padding: 25px;
            text-align: center;
            position: relative;
            box-sizing: border-box;
            z-index: 2;
        }

        /* Molduras decorativas nas quinas */
        .container::before {
            content: '';
            position: absolute;
            top: 4px; left: 4px; right: 4px; bottom: 4px;
            border: 1px solid #dfd4b4;
            pointer-events: none;
        }

        .topo-decoracao {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 10px;
        }
        
        .logo-casal img {
            width: 140px;
            height: auto;
            display: inline-block;
        }

        h1 { color: #1a1a1a; font-size: 28px; margin: 5px 0 2px 0; font-weight: bold; }
        .subtitulo { color: #444; font-size: 15px; margin: 0 0 20px 0; font-style: italic; }

        /* ❤️ Seção de Receitas Favoritas */
        .secao-favoritos {
            background-color: #f3e6c4;
            border: 2px solid #c9b996;
            border-radius: 6px;
            padding: 15px 20px;
            margin-bottom: 25px;
            text-align: left;
            position: relative;
        }
        .secao-favoritos h3 {
            margin: 0 0 15px 0;
            font-size: 16px;
            color: #2b2b2b;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        /* Balão de Coração Pixelizado */
        .coracao-decorativo {
            position: absolute;
            left: -25px;
            top: 20px;
            width: 45px;
            height: 45px;
            object-fit: contain;
        }

        .lista-favoritos {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 0;
            padding: 0;
            list-style: none;
        }
        .fav-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 14px;
            color: #333;
        }
        /* Marcador de bolinha customizado */
        .fav-item::before {
            content: "•";
            color: #2c2013;
            font-weight: bold;
            margin-right: 8px;
        }
        .fav-item a { 
            color: #2c2013; 
            text-decoration: none; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            white-space: nowrap;
            flex-grow: 1;
        }
        .fav-item a:hover { text-decoration: underline; }
        
        /* Botão Fechar quadrado marrom da imagem */
        .btn-remover-fav {
            background: #b1936a; 
            border: 2px solid #2c2013; 
            color: #2c2013;
            font-weight: bold;
            border-radius: 4px; 
            cursor: pointer; 
            padding: 2px 6px; 
            font-size: 12px;
            box-shadow: inset -1px -2px 0px rgba(0,0,0,0.2);
            margin-left: 8px;
        }
        .btn-remover-fav:hover { background: #9e7f56; }

        /* 🍳 Botões das Categorias Estilo Madeira */
        .botoes-grupo {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }
        .botoes-grupo button {
            border: 3px solid #000000;
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 15px;
            font-weight: bold;
            color: #1a1a1a;
            cursor: pointer;
            display: flex;
            flex-direction: row; /* Alinhado lado a lado como na foto */
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: inset -2px -4px 0px rgba(0,0,0,0.2), 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.05s, box-shadow 0.05s;
            font-family: 'Comfortaa', sans-serif;
        }
        .botoes-grupo button:active { 
            transform: translateY(2px); 
            box-shadow: inset -1px -1px 0px rgba(0,0,0,0.2);
        }
        .botoes-grupo button:disabled { opacity: 0.6; cursor: not-allowed; }
        .botoes-grupo button img {
            width: 32px;
            height: 32px;
            object-fit: contain;
        }

        /* Cores exatas dos botões da imagem */
        .btn-rapidas { background-color: #9cb46e; }
        .btn-banquetes { background-color: #ddaa67; }
        .btn-sobremesas { background-color: #e2a39f; }

        /* 🎲 Caixa de Instrução Tracejada */
        .roleta-box {
            background-color: transparent;
            border: 2px dashed #444;
            border-radius: 6px;
            padding: 25px;
            font-size: 16px;
            color: #222;
            margin-bottom: 20px;
        }
        .hidden { display: none; }

        /* 🎰 Resultado do Sorteio */
        .box-resultado {
            margin-top: 15px;
            padding-top: 15px;
            animation: fadeIn 0.4s ease-out;
        }
        .tag-categoria {
            display: inline-block;
            background-color: #e1d3b0;
            border: 2px solid #2c2013;
            padding: 4px 12px;
            font-size: 12px;
            font-weight: bold;
            border-radius: 4px;
            color: #2c2013;
            margin-bottom: 10px;
        }
        .box-resultado h2 { margin: 5px 0 20px 0; font-size: 20px; }
        #link-receita { color: #0044cc; text-decoration: underline; }
        
        /* Botão Salvar Estilo Madeira */
        .btn-favoritar {
            background-color: #ddaa67; 
            border: 2px solid #2c2013; 
            color: #2c2013;
            padding: 8px 20px; 
            border-radius: 4px; 
            font-size: 14px; 
            font-weight: bold;
            cursor: pointer; 
            box-shadow: inset -1px -3px 0px rgba(0,0,0,0.2);
            font-family: 'Comfortaa', sans-serif;
        }
        .btn-favoritar:hover { background-color: #c99655; }

        /* 🎵 Player de Música no Canto */
        .spotify-container {
            margin-top: 25px;
            display: flex;
            justify-content: flex-end;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="fundo-fallback">
    <img src="FRENTE.jpg" alt="Fundo">
</div>

<div class="container">
    
    <div class="topo-decoracao">
        <div class="logo-casal">
            <img src="5.png" alt="Logo Casal">
        </div>
    </div>

    <h1>Cardápio meu bem i eu</h1>
    <div class="subtitulo">o que vamos cozinhar esse mês?</div>

    <div id="painel-favoritos" class="secao-favoritos">
        <img src="5.png" class="coracao-decorativo" alt="Coração Pixel">
        <h3>❤️ Nossas Receitas Favoritas:</h3>
        <ul id="lista-favoritos" class="lista-favoritos"></ul>
    </div>

    <div class="botoes-grupo">
        <button class="btn-rapidas" onclick="sortearPorCategoria('rapidas')">
            <img src="FRENTE (3).jpg" alt="Frigideira">
            jantar vapt-vupt
        </button>
        
        <button class="btn-banquetes" onclick="sortearPorCategoria('banquetes')">
            <img src="FRENTE (2).jpg" alt="Faca">
            banquete
        </button>
        
        <button class="btn-sobremesas" onclick="sortearPorCategoria('sobremesas')">
            <img src="FRENTE (4).jpg" alt="Fouet">
            sobremesas
        </button>
    </div>

    <div id="roleta" class="roleta-box">escolha uma categoria acima!❤️</div>

    <div id="resultado-container" class="box-resultado hidden">
        <span id="rec-tag" class="tag-categoria">category tag</span>
        <h2><a id="link-receita" href="#" target="_blank" rel="noopener noreferrer">Nome de receita · hyperlink</a></h2>
        <button id="btn-fav-acao" class="btn-favoritar">⭐ Salvar nos Favoritos</button>
    </div>

    <div class="spotify-container">
        <iframe style="border-radius:12px" src="https://open.spotify.com/embed/playlist/37i9dQZF1DXcBWIGka6w7v?utm_source=generator" width="220" height="80" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
    </div>
</div>

<script>
// O JavaScript permanece o mesmo que você já construiu perfeitamente!
const receitas = [
  { id: 1, nome: "Shakshuka (Ovos no Tomate)", categoria: "rapidas", tag: "Prático e rápido", url: "https://www.lecreuset.com.br/shakshuka/SKI_084.html" },
  { id: 2, nome: "Camembert Folhado com Mel", categoria: "rapidas", tag: "Petiscar e fofocar", url: "https://www.lecreuset.com.br/entradas-e-acompanhamentos/queijo-camembert-folhado-com-mel-e-nozes/LCO-21045.html" },
  { id: 3, nome: "Creme de Abóbora com Gengibre", categoria: "rapidas", tag: "Dias frios", url: "https://www.lecreuset.com.br/entradas-e-acompanhamentos/creme-de-abobora-com-gengibre/LCO-21016.html" },
  { id: 4, nome: "Boeuf Bourguignon Tradicional", categoria: "banquetes", tag: "Date chique com vinho", url: "https://www.lecreuset.com.br/refeicoes-principais/boeuf-bourguignon/LCO-21114.html" },
  { id: 5, nome: "Ragu de Costela com Polenta", categoria: "banquetes", tag: "Almoço de domingo", url: "https://www.lecreuset.com.br/refeicoes-principais/ragu-de-costela-com-polenta-cremosa/LCO-21043.html" },
  { id: 6, nome: "Risoto de Alho-Poró com Parmesão", categoria: "banquetes", tag: "Noite italiana", url: "https://www.lecreuset.com.br/refeicoes-principais/risoto-de-alho-poro-e-parmesao/LCO-21043.html" },
  { id: 7, nome: "Arroz de Braga", categoria: "banquetes", tag: "Uma só panela", url: "https://www.lecreuset.com.br/refeicoes-principais/arroz-de-braga/LCO-21059.html" },
  { id: 8, nome: "Picadinho de Carne Tradicional", categoria: "banquetes", tag: "Especial de casa", url: "https://www.lecreuset.com.br/refeicoes-principais/picadinho-le-creuset/LCO-21107.html" },
  { id: 9, nome: "Bolo de Cenoura com Brigadeiro", categoria: "sobremesas", tag: "Cafézinho da tarde", url: "https://www.lecreuset.com.br/sobremesas/bolo-de-cenoura-com-brigadeiro/LCO-21044.html" },
  { id: 10, nome: "Tarte Tatin de Maçã Clássica", categoria: "sobremesas", tag: "Sobremesa de Chef", url: "https://www.lecreuset.com.br/sobremesas/tarte-tatin-de-maca/LCO-21051.html" },
  { id: 11, nome: "Grand Gateau de Chocolate", categoria: "sobremesas", tag: "Açúcar na veia!", url: "https://www.lecreuset.com.br/sobremesas/grand-gateau-de-chocolate/LCO-21011.html" }
];

let receitasSorteadas = [];
let favoritos = JSON.parse(localStorage.getItem('favoritos_casal')) || [];
let receitaAtual = null;

const roleta = document.getElementById('roleta');
const resultadoContainer = document.getElementById('resultado-container');
const linkReceita = document.getElementById('link-receita');
const recTag = document.getElementById('rec-tag');
const btnFavAcao = document.getElementById('btn-fav-acao');

atualizarPainelFavoritos();

function sortearPorCategoria(categoriaSelecionada) {
  let receitasFiltradas = receitas.filter(r => r.categoria === categoriaSelecionada && !receitasSorteadas.includes(r.id));
  
  if (receitasFiltradas.length === 0) {
    alert("Todas as receitas dessa categoria já saíram! Resetando histórico.");
    receitasSorteadas = receitasSorteadas.filter(id => !receitas.find(r => r.id === id && r.categoria === categoriaSelecionada));
    receitasFiltradas = receitas.filter(r => r.categoria === categoriaSelecionada);
  }
  
  document.querySelectorAll('.botoes-grupo button').forEach(b => b.disabled = true);
  resultadoContainer.classList.add('hidden');
  
  let voltas = 0;
  const intervalo = setInterval(() => {
    const aleatoria = receitasFiltradas[Math.floor(Math.random() * receitasFiltradas.length)];
    roleta.textContent = "🎲 " + aleatoria.nome;
    voltas++;
    
    if (voltas > 12) {
      clearInterval(intervalo);
      
      receitaAtual = receitasFiltradas[Math.floor(Math.random() * receitasFiltradas.length)];
      roleta.textContent = "✨ O destino escolheu! ✨";
      receitasSorteadas.push(receitaAtual.id);
      
      linkReceita.textContent = receitaAtual.nome;
      linkReceita.href = receitaAtual.url;
      recTag.textContent = receitaAtual.tag;
      
      if(favoritos.some(f => f.id === receitaAtual.id)) {
        btnFavAcao.textContent = "✓ Já está nos Favoritos";
        btnFavAcao.disabled = true;
      } else {
        btnFavAcao.textContent = "⭐ Salvar nos Favoritos";
        btnFavAcao.disabled = false;
      }
      
      resultadoContainer.classList.remove('hidden');
      document.querySelectorAll('.botoes-grupo button').forEach(b => b.disabled = false);
    }
  }, 110);
}

btnFavAcao.addEventListener('click', () => {
  if (receitaAtual && !favoritos.some(f => f.id === receitaAtual.id)) {
    favoritos.push({ id: receitaAtual.id, nome: receitaAtual.nome, url: receitaAtual.url });
    localStorage.setItem('favoritos_casal', JSON.stringify(favoritos));
    atualizarPainelFavoritos();
    btnFavAcao.textContent = "✓ Adicionado!";
    btnFavAcao.disabled = true;
  }
});

function removerFavorito(id) {
  favoritos = favoritos.filter(f => f.id !== id);
  localStorage.setItem('favoritos_casal', JSON.stringify(favoritos));
  atualizarPainelFavoritos();
  if (receitaAtual && receitaAtual.id === id) {
    btnFavAcao.textContent = "⭐ Salvar nos Favoritos";
    btnFavAcao.disabled = false;
  }
}

function atualizarPainelFavoritos() {
  const lista = document.getElementById('lista-favoritos');
  if(!lista) return;
  lista.innerHTML = "";
  
  if (favoritos.length === 0) {
    lista.innerHTML = `
      <li class="fav-item"><a href="#">Exemplo: Batata Rústica</a><button class="btn-remover-fav" disabled>×</button></li>
      <li class="fav-item"><a href="#">Exemplo: Panqueca Doce</a><button class="btn-remover-fav" disabled>×</button></li>
    `;
  } else {
    favoritos.forEach(fav => {
      const li = document.createElement('li');
      li.className = "fav-item";
      li.innerHTML = `
        <a href="${fav.url}" target="_blank" rel="noopener noreferrer">${fav.nome}</a>
        <button class="btn-remover-fav" onclick="removerFavorito(${fav.id})">×</button>
      `;
      lista.appendChild(li);
    });
  }
}
</script>

</body>
</html>
