<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio meu bem i eu</title>
    <style>
        /* 🎨 Fundo Estilo Stardew Valley */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            background-color: #f4ebd0;
            position: relative;
            overflow-x: hidden;
        }

        /* Camada de Fundo Otimizada (Com letras maiúsculas para o GitHub) */
        .fundo-fallback {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background-color: #f4ebd0;
        }
        .fundo-fallback img {
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0.25;
            filter: blur(4px);
        }

        /* 📦 O Painel Central */
        .container {
            background-color: #fffdf6;
            border: 4px solid #81984a;
            border-radius: 12px;
            box-shadow: 0 12px 35px rgba(0,0,0,0.15);
            max-width: 580px;
            width: 100%;
            padding: 25px;
            text-align: center;
            position: relative;
            box-sizing: border-box;
            z-index: 2;
        }

        .topo-decoracao {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 5px;
        }
        .ramo-pixel { font-size: 24px; color: #bfa17a; }
        
        .logo-casal img {
            width: 100px;
            height: auto;
            display: block;
        }

        h1 { color: #2b2b2b; font-size: 26px; margin: 5px 0 2px 0; font-weight: bold; }
        .subtitulo { color: #555; font-size: 14px; margin: 0 0 20px 0; }

        /* ❤️ Seção de Receitas Favoritas */
        .secao-favoritos {
            background-color: #f6ebd2;
            border: 2px solid #d4c5a1;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: left;
            position: relative;
        }
        .secao-favoritos h3 {
            margin: 0 0 12px 0;
            font-size: 15px;
            color: #2b2b2b;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .coracao-decorativo {
            position: absolute;
            left: -20px;
            top: -20px;
            width: 45px;
            height: 45px;
            object-fit: contain;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.15));
        }

        .lista-favoritos {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 0;
            padding: 0;
            list-style: none;
        }
        .fav-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.6);
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 13px;
        }
        .fav-item a { color: #333; text-decoration: none; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .fav-item a:hover { text-decoration: underline; }
        .btn-remover-fav {
            background: #b5a484; border: 1px solid #7a6e56; color: white;
            border-radius: 3px; cursor: pointer; padding: 0px 5px; font-size: 11px;
        }

        /* 🍳 Botões das Categorias */
        .botoes-grupo {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }
        .botoes-grupo button {
            border: 3px solid #2c2013;
            border-radius: 8px;
            padding: 8px 5px;
            font-size: 14px;
            font-weight: bold;
            color: #2c2013;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: inset -2px -4px 0px rgba(0,0,0,0.15);
            transition: transform 0.1s;
        }
        .botoes-grupo button:active { transform: scale(0.97); }
        .botoes-grupo button:disabled { opacity: 0.6; cursor: not-allowed; }
        .botoes-grupo button img {
            width: 28px;
            height: 28px;
            object-fit: contain;
        }

        .btn-rapidas { background-color: #90a96e; }
        .btn-banquetes { background-color: #dca052; }
        .btn-sobremesas { background-color: #e59994; }

        /* 🎲 Caixa de Instrução */
        .roleta-box {
            background-color: #fffdf6;
            border: 2px dashed #a49a83;
            border-radius: 6px;
            padding: 20px;
            font-size: 16px;
            color: #444;
            margin-bottom: 20px;
        }
        .hidden { display: none; }

        /* 🎰 Resultado do Sorteio */
        .box-resultado {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px solid #ebdcb9;
            animation: fadeIn 0.4s ease-out;
        }
        .tag-categoria {
            display: inline-block;
            background-color: #e4d5b1;
            border: 1px solid #bdae8c;
            padding: 3px 10px;
            font-size: 11px;
            font-weight: bold;
            border-radius: 4px;
            color: #555;
            margin-bottom: 8px;
        }
        .box-resultado h2 { margin: 5px 0 15px 0; }
        #link-receita { color: #0066cc; font-size: 18px; text-decoration: underline; }
        
        .btn-favoritar {
            background-color: #d2b48c; border: 2px solid #5c4033; color: #4a2f13;
            padding: 6px 16px; border-radius: 6px; font-size: 13px; font-weight: bold;
            cursor: pointer; box-shadow: inset -1px -3px 0px rgba(0,0,0,0.1);
        }
        .btn-favoritar:hover { background-color: #c1a37c; }

        /* 🎵 Player de Música */
        .spotify-container {
            margin-top: 25px;
            text-align: right;
            display: flex;
            justify-content: flex-end;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
