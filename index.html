<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cardápio meu bem i eu</title>

<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family: 'VT323', monospace;
    background:#e9dfc3;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

img { image-rendering: pixelated; }

.container {
    background:#fff6db;
    border:4px solid #3b2f1c;
    box-shadow:
        inset -4px -4px 0 #d8c79a,
        inset 4px 4px 0 #fff8e5,
        0 6px 0 #3b2f1c;
    padding:20px;
    width:720px;
    text-align:center;
}

h1 { font-size:32px; margin:0; }

.sub { margin-bottom:15px; }

.botoes {
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:10px;
}

button {
    font-family:inherit;
    font-size:20px;
    border:3px solid #3b2f1c;
    background:#c8a46b;
    box-shadow:
        inset -3px -3px 0 #8c6f3f,
        inset 3px 3px 0 #f2d29b,
        0 4px 0 #3b2f1c;
    cursor:pointer;
    padding:10px;
}

button:active {
    transform:translateY(4px);
    box-shadow: inset -2px -2px 0 #8c6f3f;
}

.resultado {
    margin-top:20px;
    border:3px dashed #3b2f1c;
    padding:20px;
    background:#fff8dc;
    min-height:80px;
}

/* animação roleta */
.spin {
    animation: spin 0.1s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(3deg); }
}

/* fade */
.fade {
    animation: fade 0.5s ease;
}
@keyframes fade {
    from { opacity:0; transform:translateY(10px); }
    to { opacity:1; }
}
</style>
</head>

<body>

<div class="container">

<h1>Cardápio meu bem i eu</h1>
<div class="sub">o que vamos cozinhar hoje?</div>

<div class="botoes">
<button onclick="sortear('rapidas')">🍳 rápido</button>
<button onclick="sortear('banquete')">🍖 banquete</button>
<button onclick="sortear('sobremesa')">🍰 doce</button>
</div>

<div id="resultado" class="resultado">
escolha uma categoria ❤️
</div>

<audio id="click" src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b2b06.mp3"></audio>
<audio id="win" src="https://cdn.pixabay.com/audio/2022/03/15/audio_3c1f9a3b1b.mp3"></audio>

</div>

<script>

// receitas reais (adaptadas do site)
const receitas = [
{nome:"Shakshuka", cat:"rapidas", url:"https://www.lecreuset.com.br/shakshuka/SKI_084.html"},
{nome:"Camembert Folhado", cat:"rapidas", url:"https://www.lecreuset.com.br/entradas-e-acompanhamentos/queijo-camembert-folhado-com-mel-e-nozes/LCO-21045.html"},
{nome:"Creme de Abóbora", cat:"rapidas", url:"https://www.lecreuset.com.br/entradas-e-acompanhamentos/creme-de-abobora-com-gengibre/LCO-21016.html"},

{nome:"Boeuf Bourguignon", cat:"banquete", url:"https://www.lecreuset.com.br/refeicoes-principais/boeuf-bourguignon/LCO-21114.html"},
{nome:"Risoto de Alho Poró", cat:"banquete", url:"https://www.lecreuset.com.br/refeicoes-principais/risoto-de-alho-poro-e-parmesao/LCO-21043.html"},
{nome:"Ragu de Costela", cat:"banquete", url:"https://www.lecreuset.com.br/refeicoes-principais/ragu-de-costela-com-polenta-cremosa/LCO-21043.html"},

{nome:"Bolo de Cenoura", cat:"sobremesa", url:"https://www.lecreuset.com.br/sobremesas/bolo-de-cenoura-com-brigadeiro/LCO-21044.html"},
{nome:"Tarte Tatin", cat:"sobremesa", url:"https://www.lecreuset.com.br/sobremesas/tarte-tatin-de-maca/LCO-21051.html"},
{nome:"Grand Gateau", cat:"sobremesa", url:"https://www.lecreuset.com.br/sobremesas/grand-gateau-de-chocolate/LCO-21011.html"}
];

function sortear(cat){

    document.getElementById("click").play();

    const box = document.getElementById("resultado");
    box.innerHTML = "🎲 sorteando...";
    box.classList.add("spin");

    setTimeout(()=>{

        box.classList.remove("spin");

        const lista = receitas.filter(r=>r.cat===cat);
        const r = lista[Math.floor(Math.random()*lista.length)];

        document.getElementById("win").play();

        box.innerHTML = `
        <div class="fade">
        ⭐ ${r.nome} <br><br>
        <a href="${r.url}" target="_blank">ver receita</a>
        </div>
        `;

    }, 1500);
}
</script>

</body>
</html>
