<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cardápio meu bem i eu</title>

<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'VT323', monospace;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

/* FUNDO */
body::before {
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:
        linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.6)),
        url("logo.png") center/cover no-repeat;
    filter: blur(6px);
    transform: scale(1.05);
    z-index:-1;
}

/* CONTAINER */
.container {
    background:#fff6db;
    border:4px solid #3b2f1c;
    border-radius:10px;
    box-shadow:
        inset -4px -4px 0 #d8c79a,
        inset 4px 4px 0 #fff8e5,
        0 10px 0 #2a1f12;
    padding:25px;
    width:720px;
    text-align:center;
    position:relative;
}

/* ✨ DECORAÇÃO */
.container::before {
    content:"🌿";
    position:absolute;
    top:10px;
    left:10px;
    font-size:24px;
}

.container::after {
    content:"🌿";
    position:absolute;
    bottom:10px;
    right:10px;
    font-size:24px;
}

/* LOGO */
.logo {
    width:240px;
    filter: drop-shadow(0 4px 0 #3b2f1c);
}

/* 💖 CORAÇÃO */
.heart {
    position:absolute;
    left:-45px;
    top:15px;
    width:80px;
    animation:pulse 1s infinite;
    filter: drop-shadow(0 3px 0 #3b2f1c);
}

@keyframes pulse {
    0% { transform:scale(1); }
    50% { transform:scale(1.25); }
    100% { transform:scale(1); }
}

/* BOTÕES */
.botoes {
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:12px;
    margin-top:20px;
}

button {
    font-family:inherit;
    font-size:20px;
    border:3px solid #3b2f1c;
    background:#c8a46b;
    border-radius:8px;
    box-shadow:
        inset -3px -3px 0 #8c6f3f,
        inset 3px 3px 0 #f2d29b,
        0 4px 0 #3b2f1c;
    cursor:pointer;
    padding:10px;
    transition:0.2s;
}

button:hover {
    transform:scale(1.05);
    filter: brightness(1.05);
}

button:active {
    transform:translateY(4px);
}

/* SLOT */
.slot-window {
    width:300px;
    height:80px;
    overflow:hidden;
    border:4px solid #3b2f1c;
    border-radius:10px;
    background:#fff8dc;
    margin:25px auto;
    position:relative;
    box-shadow:
        inset 0 8px 15px rgba(0,0,0,0.25),
        inset 0 -8px 15px rgba(0,0,0,0.25);
}

/* BRILHO */
.slot-window::after {
    content:"";
    position:absolute;
    inset:0;
    background: linear-gradient(
        to bottom,
        rgba(255,255,255,0.25),
        transparent,
        rgba(0,0,0,0.2)
    );
}

.slot-track {
    position:absolute;
    width:100%;
}

.slot-item {
    height:80px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    opacity:0.6;
}

/* ITEM FINAL */
.slot-item.active {
    transform: scale(1.2);
    opacity:1;
    color:#2c2013;
    text-shadow: 0 0 6px rgba(255,255,255,0.9);
}

/* RESULTADO */
.resultado {
    margin-top:15px;
    font-size:20px;
    animation:pop 0.4s ease;
}

@keyframes pop {
    0% { transform:scale(0.8); opacity:0; }
    100% { transform:scale(1); }
}
</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">
<img src="coracao.png" class="heart">

<h1>Cardápio meu bem i eu</h1>

<div class="botoes">
<button onclick="sortear('rapidas')">🍳 rápido</button>
<button onclick="sortear('banquete')">🍖 banquete</button>
<button onclick="sortear('sobremesa')">🍰 doce</button>
</div>

<div class="slot-window">
    <div class="slot-track" id="track"></div>
</div>

<div id="resultado" class="resultado"></div>

</div>

<script>

const receitas = [
{nome:"Shakshuka",cat:"rapidas",url:"https://www.lecreuset.com.br/shakshuka/SKI_084.html"},
{nome:"Camembert Folhado",cat:"rapidas",url:"https://www.lecreuset.com.br/entradas-e-acompanhamentos/queijo-camembert-folhado-com-mel-e-nozes/LCO-21045.html"},
{nome:"Creme de Abóbora",cat:"rapidas",url:"https://www.lecreuset.com.br/entradas-e-acompanhamentos/creme-de-abobora-com-gengibre/LCO-21016.html"},

{nome:"Boeuf Bourguignon",cat:"banquete",url:"https://www.lecreuset.com.br/refeicoes-principais/boeuf-bourguignon/LCO-21114.html"},
{nome:"Ragu de Costela",cat:"banquete",url:"https://www.lecreuset.com.br/refeicoes-principais/ragu-de-costela-com-polenta-cremosa/LCO-21043.html"},
{nome:"Risoto de Alho-Poró",cat:"banquete",url:"https://www.lecreuset.com.br/refeicoes-principais/risoto-de-alho-poro-e-parmesao/LCO-21043.html"},

{nome:"Bolo de Cenoura",cat:"sobremesa",url:"https://www.lecreuset.com.br/sobremesas/bolo-de-cenoura-com-brigadeiro/LCO-21044.html"},
{nome:"Tarte Tatin",cat:"sobremesa",url:"https://www.lecreuset.com.br/sobremesas/tarte-tatin-de-maca/LCO-21051.html"},
{nome:"Grand Gateau",cat:"sobremesa",url:"https://www.lecreuset.com.br/sobremesas/grand-gateau-de-chocolate/LCO-21011.html"}
];

function sortear(cat){

    const lista = receitas.filter(r=>r.cat===cat);
    const track = document.getElementById("track");
    const resultado = document.getElementById("resultado");

    let items=[];
    for(let i=0;i<25;i++){
        items.push(lista[Math.floor(Math.random()*lista.length)]);
    }

    track.innerHTML = items.map(r=>`<div class="slot-item">${r.nome}</div>`).join("");

    let pos=0;
    let speed=30;

    const anim=setInterval(()=>{
        pos+=speed;
        track.style.transform=`translateY(-${pos}px)`;
        speed*=0.97;

        if(speed<1){
            clearInterval(anim);

            const final=lista[Math.floor(Math.random()*lista.length)];
            const index=items.findIndex(i=>i.nome===final.nome);

            track.style.transition="transform 0.5s ease-out";
            track.style.transform=`translateY(-${index*80}px)`;

            track.children[index].classList.add("active");

            setTimeout(()=>{
                resultado.innerHTML=`
                ⭐ ${final.nome}<br><br>
                <a href="${final.url}" target="_blank">ver receita</a>
                `;
            },500);
        }

    },16);
}

</script>

</body>
</html>
